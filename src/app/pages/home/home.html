<div class="min-h-screen bg-stone-50 pt-28 md:pt-32 px-5 md:px-10 pb-10 flex flex-col">
    <div class="max-w-7xl w-full mx-auto">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-gray-900 tracking-tight mb-2">
                Nuestra <span class="text-red-500">Recomendación</span>
            </h2>
            <p class="text-gray-500 font-medium">Descubre los platos más exclusivos de nuestra cocina artesanal.</p>
        </header>

        <!-- el grid de las cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            @for (food of foods; track $index) {
            <app-food-card [food]="food" class="h-full"></app-food-card>
            }
        </div>
    </div>
</div>
