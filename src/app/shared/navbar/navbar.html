@if(isModalOpen()) {
<div
    class="fixed inset-0 z-[100] flex items-center justify-center bg-stone-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
    <div
        class="bg-white rounded-[2.5rem] p-8 w-full max-w-lg shadow-[0_24px_48px_rgba(0,0,0,0.1)] relative transform transition-all animate-in zoom-in-95 duration-200">
        <!-- Close Button -->
        <button (click)="isModalOpen.set(false)"
            class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 transition-colors cursor-pointer bg-gray-100 rounded-full p-2 hover:bg-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                    clip-rule="evenodd" />
            </svg>
        </button>

        <!-- Title -->
        <h3 class="text-2xl font-black text-gray-900 mb-6 tracking-tight">Agregar <span
                class="text-red-500">Platillo</span></h3>

        <!-- Form fields -->
        <form class="space-y-4">
            <div>
                <label class="block mb-1.5 text-sm font-bold text-gray-700">IMG URL:</label>
                <input type="text" placeholder="https://..."
                    class="w-full bg-stone-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-red-500 focus:border-red-500 block p-3 transition-colors outline-none" />
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1.5 text-sm font-bold text-gray-700">Nombre:</label>
                    <input type="text" placeholder="Ej. Tacos al Pastor"
                        class="w-full bg-stone-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-red-500 focus:border-red-500 block p-3 transition-colors outline-none" />
                </div>
                <div>
                    <label class="block mb-1.5 text-sm font-bold text-gray-700">Precio:</label>
                    <input type="number" placeholder="Ej. 120" min="0" step="0.01" required
                        class="w-full bg-stone-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-red-500 focus:border-red-500 block p-3 transition-colors outline-none invalid:[&:not(:placeholder-shown):not(:focus)]:border-red-500 invalid:[&:not(:placeholder-shown):not(:focus)]:ring-1 invalid:[&:not(:placeholder-shown):not(:focus)]:ring-red-500 invalid:[&:not(:placeholder-shown):not(:focus)]:text-red-500 peer" />
                    <span
                        class="mt-1.5 hidden text-xs text-red-500 font-medium peer-[&:not(:placeholder-shown):not(:focus):invalid]:block">Por
                        favor ingresa un precio válido mayor a 0</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1.5 text-sm font-bold text-gray-700">Categoría:</label>
                    <input type="text" placeholder="Ej. Mexicana" pattern="[A-Za-zÀ-ÿ\s]+" required
                        title="Solo se permiten letras"
                        class="w-full bg-stone-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-red-500 focus:border-red-500 block p-3 transition-colors outline-none invalid:[&:not(:placeholder-shown):not(:focus)]:border-red-500 invalid:[&:not(:placeholder-shown):not(:focus)]:ring-1 invalid:[&:not(:placeholder-shown):not(:focus)]:ring-red-500 invalid:[&:not(:placeholder-shown):not(:focus)]:text-red-500 peer" />
                    <span
                        class="mt-1.5 hidden text-xs text-red-500 font-medium peer-[&:not(:placeholder-shown):not(:focus):invalid]:block">La
                        categoría solo puede contener letras</span>
                </div>
                <div class="flex items-center mt-7">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div
                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500">
                        </div>
                        <span class="ml-3 text-sm font-bold text-gray-700">Disponible</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block mb-1.5 text-sm font-bold text-gray-700">Descripción:</label>
                <textarea rows="3" placeholder="Descripción del platillo..."
                    class="w-full bg-stone-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-red-500 focus:border-red-500 block p-3 transition-colors outline-none resize-none"></textarea>
            </div>

            <button type="button" (click)="isModalOpen.set(false)"
                class="w-full mt-4 bg-red-500 text-white font-bold rounded-xl px-5 py-4 text-center shadow-[0_8px_16px_rgba(239,68,68,0.3)] hover:bg-orange-500 hover:shadow-[0_8px_16px_rgba(249,115,22,0.3)] transition-all active:scale-95 cursor-pointer text-base">
                Guardar Platillo
            </button>
        </form>
    </div>
</div>
}
