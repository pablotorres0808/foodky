<!-- la card de la comida -->
<div class="group relative w-full max-w-[320px] h-full transition-all duration-700 hover:-translate-y-3">
    <!-- el brillo de atras -->
    <div
        class="absolute -inset-3 bg-gradient-to-tr from-orange-500/15 to-red-500/15 rounded-[3rem] blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-700">
    </div>

    <!-- contenedor de la card -->
    <div
        class="relative bg-white rounded-[3rem] p-3 shadow-[0_20px_80px_rgba(0,0,0,0.06)] border border-gray-200 h-full flex flex-col">

        <!-- imagen -->
        <div class="relative h-48 w-full rounded-[2.5rem] overflow-hidden shadow-inner bg-stone-100 shrink-0">
            @if(food.url_img) {
            <img [src]="food.url_img" [alt]="food.name"
                class="w-full h-full object-cover transition-transform duration-1000 ease-out group-hover:scale-105" />
            } @else {
            <!-- por si no hay imagen -->
            <div
                class="w-full h-full bg-gradient-to-br from-stone-100 to-stone-200 flex flex-col items-center justify-center transition-transform duration-1000 ease-out group-hover:scale-105">
                <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-2">
                    <img src="/favicon.png" alt="RecetasApp" class="w-8 h-8 opacity-50 grayscale" />
                </div>
            </div>
            }
            <!-- sombrita -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-70">
            </div>
        </div>

        <!-- info y demas -->
        <div class="pt-5 pb-2 px-3 flex flex-col flex-grow">
            <!-- categoria -->
            <div class="flex items-center gap-2 mb-2">
                <span class="text-[10px] font-black uppercase tracking-[0.15em] text-red-500/80">
                    {{ food.category }}
                </span>
                <div class="h-px flex-grow bg-stone-100"></div>
                @if(!food.available) {
                <span class="text-[9px] font-bold text-red-500/60 uppercase tracking-tight line-through">Agotado</span>
                }
            </div>

            <!-- titulo y precio -->
            <div class="flex justify-between items-start mb-3 gap-2">
                <div class="flex flex-col flex-grow">
                    <h3 class="text-xl font-black text-gray-900 tracking-tight leading-tight line-clamp-2 min-h-[3rem]">
                        {{ food.name }}
                    </h3>
                </div>
                <div class="flex items-center text-orange-500 shrink-0">
                    <span class="text-lg font-black tracking-tighter">{{ food.price | currency }}</span>
                </div>
            </div>

            <p
                class="text-gray-500 text-[11px] font-medium leading-relaxed mb-6 line-clamp-2 italic opacity-75 min-h-[2.5rem]">
                "{{ food.description }}"
            </p>

            <!-- el boton -->
            <div class="w-full mt-auto">
                <div [class.opacity-40]="!food.available" [class.grayscale]="!food.available" class="relative">
                    <div class="bg-gradient-to-b from-red-500/20 to-transparent p-[1.5px] rounded-[18px]">
                        <button [disabled]="!food.available"
                            class="group/btn w-full p-[2px] rounded-[16.5px] bg-gradient-to-b from-white to-orange-50/50 shadow-sm active:scale-95 transition-all duration-300 disabled:cursor-not-allowed cursor-pointer">
                            <div
                                class="bg-gradient-to-br from-red-500 to-red-600 rounded-[14px] px-4 py-3 transition-colors group-hover/btn:from-orange-500 group-hover/btn:to-orange-600">
                                <div class="flex gap-2 items-center justify-center text-white">
                                    <span class="font-black text-[10px] uppercase tracking-widest">Ordenar</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20"
                                        fill="currentColor">
                                        <path fill-rule="evenodd"
                                            d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                                            clip-rule="evenodd" />
                                    </svg>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
